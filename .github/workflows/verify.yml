name: CI Verify

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install sympy

      - name: CAS Symbolic Verification
        run: python scripts/cas_symbolic_verification.py

      - name: Spectral Invariant Verification
        run: python scripts/spectral_invariant_verify.py
